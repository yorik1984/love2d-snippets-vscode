name: Publish

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Publish to Marketplace
        run: |
          vsce publish -p ${{ secrets.VSCE_PAT }} 2>&1 | tee output.log
          if grep -q "already exists" output.log; then
            echo "⚠️ Version already exists on marketplace"
            exit 0
          fi
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

name: Sync snippets from love2d-snippets

on:
  schedule:
    # Runs every Monday at 00:30 UTC
    - cron: "30 0 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout destination repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone source repo
        run: git clone https://github.com/yorik1984/love2d-snippets.git ./temp_snippets

      - name: Check if package.json exists
        run: |
          if [ ! -f package.json ]; then
            echo "ERROR: package.json not found"
            exit 1
          fi

      - name: Copy snippets folder
        run: |
          rm -rf snippets
          cp -r ./temp_snippets/snippets snippets

      - name: Copy contributes.snippets from package.json
        run: |
          node -e "
            const src = JSON.parse(require('fs').readFileSync('./temp_snippets/package.json'));
            const dst = JSON.parse(require('fs').readFileSync('./package.json'));
            dst.contributes = dst.contributes || {};
            dst.contributes.snippets = src.contributes.snippets;
            require('fs').writeFileSync('./package.json', JSON.stringify(dst, null, 2));
          "

      - name: Merge changelog entries
        run: |
          node -e "
            import { readFileSync, existsSync, writeFileSync } from 'fs';

            // Read source changelog
            let sourceChangelog = readFileSync('./temp_snippets/CHANGELOG.md', 'utf8');

            // Read destination changelog (if exists)
            let destChangelog = '';
            let destVersions = new Set();

            if (existsSync('./CHANGELOG.md')) {
                destChangelog = readFileSync('./CHANGELOG.md', 'utf8');
                // Extract existing version numbers from destination
                let versionRegex = /^## \[(\d+\.\d+\.\d+)\]/gm;
                let match;
                while ((match = versionRegex.exec(destChangelog)) !== null) {
                    destVersions.add(match[1]);
                }
            } else {
                // If no CHANGELOG.md exists, use a template
                destChangelog = '# Changelog\n\nAll notable changes to this project will be documented in this file.\n\nThe format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),\nand this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n\n';
            }

            // Extract ALL versions from source with their FULL content
            function extractVersions(content) {
                let versions = [];
                let lines = content.split('\n');
                let i = 0;

                while (i < lines.length) {
                    // Find a version header
                    let headerMatch = lines[i].match(/^## \[(\d+\.\d+\.\d+)\]/);
                    if (headerMatch) {
                        let version = headerMatch[1];
                        let entryLines = [lines[i]];
                        i++;

                        // Collect all lines until next version header or end of file
                        while (i < lines.length && !lines[i].match(/^## \[\d+\.\d+\.\d+\]/)) {
                            entryLines.push(lines[i]);
                            i++;
                        }

                        versions.push({
                            version: version,
                            fullEntry: entryLines.join('\n')
                        });
                    } else {
                        i++;
                    }
                }

                return versions;
            }

            // Extract versions from source
            let sourceVersions = extractVersions(sourceChangelog);

            // Filter new versions (not in destination)
            let newEntries = sourceVersions.filter(entry => !destVersions.has(entry.version));

            // If no new entries, exit
            if (newEntries.length === 0) {
                console.log('No new changelog entries to add');
                process.exit(0);
            }

            // Sort new entries by version (newest first)
            newEntries.sort((a, b) => {
                let aParts = a.version.split('.').map(Number);
                let bParts = b.version.split('.').map(Number);
                for (let i = 0; i < 3; i++) {
                    if (aParts[i] !== bParts[i]) return bParts[i] - aParts[i];
                }
                return 0;
            });

            // Split destination changelog into header and versions
            function splitChangelog(content) {
                let lines = content.split('\n');
                let headerEndIndex = 0;

                // Find first version header
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].match(/^## \[\d+\.\d+\.\d+\]/)) {
                        headerEndIndex = i;
                        break;
                    }
                }

                // If no versions found, everything is header
                if (headerEndIndex === 0 && !lines[0].match(/^## \[/)) {
                    headerEndIndex = lines.length;
                }

                let header = lines.slice(0, headerEndIndex).join('\n');
                let existingVersions = lines.slice(headerEndIndex).join('\n');

                return { header, existingVersions };
            }

            let { header, existingVersions } = splitChangelog(destChangelog);

            // Build new changelog: header + new entries + existing versions
            let newChangelog = header;

            // Add each new entry with proper spacing (including blank line before header)
            for (let entry of newEntries) {
                // Add a blank line before the version header
                newChangelog += '\n\n' + entry.fullEntry;
            }

            // Add existing versions if they exist
            if (existingVersions.trim()) {
                // Ensure proper spacing before existing versions
                newChangelog += '\n\n' + existingVersions;
            }

            // Clean up excessive newlines (more than 2 becomes 2)
            newChangelog = newChangelog.replace(/\n{3,}/g, '\n\n');

            // Ensure final newline
            if (!newChangelog.endsWith('\n')) {
                newChangelog += '\n';
            }

            // Write the merged changelog
            writeFileSync('./CHANGELOG.md', newChangelog);
            console.log('Added ' + newEntries.length + ' new changelog entries:');
            newEntries.forEach(e => console.log('  - ' + e.version));
          "

      - name: Commit and push
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git add .
          git status
          git commit -m "sync: update snippets from `yorik1984/love2d-snippets` [skip ci]"
          git push -v
          git log -1 --stat

      - name: Remove temp_snippets folder
        run: rm -rf temp_snippets

name: Build VS Code Extension

on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'snippets/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Get current version from package.json
        id: current_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >>
          $GITHUB_OUTPUT

      - name: Check if release with this tag exists
        id: check_release
        run: |
          TAG="v${{ steps.current_version.outputs.VERSION }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "RELEASE_EXISTS=true" >> $GITHUB_OUTPUT
            echo "Release $TAG already exists. Skipping..."
          else
            echo "RELEASE_EXISTS=false" >> $GITHUB_OUTPUT
            echo "Release $TAG does not exist. Proceeding..."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get previous version from git tags
        id: prev_version
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        run: |
          PREV_TAG=$(git tag -l "v*" --sort=-v:refname | head -n1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            PREV_VERSION=${PREV_TAG#v}
            echo "VERSION=$PREV_VERSION" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Compare versions (skip if not higher)
        id: compare
        if: steps.check_release.outputs.RELEASE_EXISTS == 'false'
        run: |
          CURRENT="${{ steps.current_version.outputs.VERSION }}"
          PREV="${{ steps.prev_version.outputs.VERSION }}"

          version_gt() {
            test "$(printf '%s\n' "$@" | sort -V | head -n 1)" != "$1"
          }

          if version_gt "$CURRENT" "$PREV"; then
            echo "VERSION_INCREASED=true" >> $GITHUB_OUTPUT
            echo "Version increased from $PREV to $CURRENT"
          else
            echo "VERSION_INCREASED=false" >> $GITHUB_OUTPUT
            echo "Version not increased ($CURRENT <= $PREV). Skipping build."
          fi

      - name: Install vsce
        if: steps.compare.outputs.VERSION_INCREASED == 'true'
        run: npm install -g @vscode/vsce

      - name: Package VS Code Extension
        if: steps.compare.outputs.VERSION_INCREASED == 'true'
        run: vsce package

      - name: Create Release
        if: steps.compare.outputs.VERSION_INCREASED == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.current_version.outputs.VERSION }}
          name: Release v${{ steps.current_version.outputs.VERSION }}
          files: ./*.vsix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
